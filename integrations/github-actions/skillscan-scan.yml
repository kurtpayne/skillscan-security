name: SkillScan Security Scan

# Reusable workflow — call from any repository to scan skill artifacts
# and (optionally) upload SARIF results to the GitHub Security tab.
#
# INSTALLATION:
#   Copy this file to .github/workflows/skillscan-scan.yml in the
#   skillscan-security repository (requires the `workflows` permission).
#   Once installed, consumer repos can call it as a reusable workflow:
#
#   jobs:
#     skillscan:
#       uses: kurtpayne/skillscan-security/.github/workflows/skillscan-scan.yml@main
#       with:
#         scan-path: ./skills
#
# STANDALONE:
#   Alternatively, copy this file directly into any repository's
#   .github/workflows/ directory to run skillscan as a local workflow.
#
# See docs/GITHUB_ACTIONS.md for full documentation.

on:
  workflow_call:
    inputs:
      scan-path:
        description: >
          Path (relative to the repository root) to scan.
          Can be a directory, a single file, or a glob pattern.
        required: true
        type: string
      python-version:
        description: Python version to use for the scanner.
        required: false
        type: string
        default: "3.12"
      policy-profile:
        description: >
          Built-in policy profile: strict (default), moderate, or permissive.
        required: false
        type: string
        default: strict
      policy-file:
        description: >
          Path to a custom policy YAML file (relative to the repo root).
          Overrides policy-profile when set.
        required: false
        type: string
        default: ""
      fail-on:
        description: >
          Exit non-zero when the verdict reaches this level: block (default), warn, or never.
        required: false
        type: string
        default: block
      rulepack-channel:
        description: >
          Rulepack channel: stable (default), preview, or labs.
        required: false
        type: string
        default: stable
      upload-sarif:
        description: >
          Upload SARIF results to the GitHub Security tab.
          Requires the repository to have GitHub Code Security or
          GitHub Advanced Security enabled.
        required: false
        type: boolean
        default: true
      sarif-category:
        description: >
          Category string for the SARIF upload, used to differentiate
          results when multiple analysis tools report on the same commit.
        required: false
        type: string
        default: skillscan-security
      extra-args:
        description: >
          Additional CLI arguments passed directly to `skillscan scan`.
          Example: "--ml-detect --graph --clamav"
        required: false
        type: string
        default: ""
      skillscan-version:
        description: >
          Version constraint for the skillscan-security package.
          Examples: ">=0.3.1", "==0.3.1", "" (latest).
        required: false
        type: string
        default: ""

jobs:
  scan:
    name: SkillScan Security Scan
    runs-on: ubuntu-latest
    permissions:
      # Required for SARIF upload to the Security tab
      security-events: write
      # Required for actions/checkout in private repos
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install skillscan-security
        run: |
          python -m pip install --upgrade pip
          if [ -n "${{ inputs.skillscan-version }}" ]; then
            pip install "skillscan-security${{ inputs.skillscan-version }}"
          else
            pip install skillscan-security
          fi

      - name: Run SkillScan (SARIF)
        if: inputs.upload-sarif
        id: scan-sarif
        continue-on-error: true
        run: |
          set +e
          POLICY_ARG=""
          if [ -n "${{ inputs.policy-file }}" ]; then
            POLICY_ARG="--policy ${{ inputs.policy-file }}"
          else
            POLICY_ARG="--policy-profile ${{ inputs.policy-profile }}"
          fi

          skillscan scan "${{ inputs.scan-path }}" \
            $POLICY_ARG \
            --format sarif \
            --out results.sarif \
            --fail-on "${{ inputs.fail-on }}" \
            --rulepack-channel "${{ inputs.rulepack-channel }}" \
            ${{ inputs.extra-args }}
          SCAN_EXIT=$?

          echo "exit-code=$SCAN_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run SkillScan (text summary)
        if: inputs.upload-sarif
        continue-on-error: true
        run: |
          POLICY_ARG=""
          if [ -n "${{ inputs.policy-file }}" ]; then
            POLICY_ARG="--policy ${{ inputs.policy-file }}"
          else
            POLICY_ARG="--policy-profile ${{ inputs.policy-profile }}"
          fi

          echo "## SkillScan Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          skillscan scan "${{ inputs.scan-path }}" \
            $POLICY_ARG \
            --format compact \
            --fail-on never \
            --rulepack-channel "${{ inputs.rulepack-channel }}" \
            --no-auto-intel \
            ${{ inputs.extra-args }} >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run SkillScan (no SARIF)
        if: ${{ !inputs.upload-sarif }}
        id: scan-text
        run: |
          POLICY_ARG=""
          if [ -n "${{ inputs.policy-file }}" ]; then
            POLICY_ARG="--policy ${{ inputs.policy-file }}"
          else
            POLICY_ARG="--policy-profile ${{ inputs.policy-profile }}"
          fi

          skillscan scan "${{ inputs.scan-path }}" \
            $POLICY_ARG \
            --format text \
            --fail-on "${{ inputs.fail-on }}" \
            --rulepack-channel "${{ inputs.rulepack-channel }}" \
            ${{ inputs.extra-args }}

      - name: Upload SARIF to GitHub Security tab
        if: inputs.upload-sarif && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ${{ inputs.sarif-category }}

      - name: Upload SARIF as build artifact
        if: inputs.upload-sarif && always()
        uses: actions/upload-artifact@v4
        with:
          name: skillscan-sarif
          path: results.sarif
          retention-days: 30

      - name: Enforce fail-on verdict
        if: inputs.upload-sarif && steps.scan-sarif.outputs.exit-code != '0'
        run: |
          echo "::error::SkillScan scan returned verdict that meets the --fail-on=${{ inputs.fail-on }} threshold."
          exit ${{ steps.scan-sarif.outputs.exit-code }}
