# SkillScan Website — GitHub Pages Deployment
#
# Deploys the skillscan.sh website (React + Vite) to GitHub Pages
# on every push to main. The site source lives in a separate
# repository (e.g., kurtpayne/skillscan-website) and is referenced
# here as a submodule or via a repository_dispatch event.
#
# SETUP INSTRUCTIONS:
# 1. In the website repo (kurtpayne/skillscan-website):
#    - Copy this file to .github/workflows/deploy.yml
#    - Go to Settings → Pages → Source: "GitHub Actions"
#    - Ensure the repo has Pages enabled
#
# 2. For custom domain (skillscan.sh):
#    - Add a CNAME file to client/public/ containing: skillscan.sh
#    - In Cloudflare DNS: add CNAME record pointing skillscan.sh
#      to kurtpayne.github.io (proxy status: DNS only, not proxied)
#    - In GitHub Pages settings: set custom domain to skillscan.sh
#      and enable "Enforce HTTPS"
#
# This workflow runs pnpm build (Vite) and deploys dist/public/
# to the gh-pages environment.

name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          # Analytics (optional — set these as repo secrets)
          VITE_ANALYTICS_ENDPOINT: ${{ secrets.VITE_ANALYTICS_ENDPOINT || '' }}
          VITE_ANALYTICS_WEBSITE_ID: ${{ secrets.VITE_ANALYTICS_WEBSITE_ID || '' }}
          # Suppress other Manus-specific env vars for standalone deployment
          VITE_APP_TITLE: "SkillScan"
          VITE_APP_ID: "skillscan"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
