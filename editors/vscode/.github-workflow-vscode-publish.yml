# Copy this to .github/workflows/release-vscode.yml
# Publishes to VS Code Marketplace and Open VSX on every v* tag.
name: Release VS Code Extension
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: editors/vscode
      - name: Compile TypeScript
        run: npm run compile
        working-directory: editors/vscode
      - name: Sync version from pyproject.toml
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.loads(open('pyproject.toml').read()); print(d['project']['version'])")
          cd editors/vscode
          npm version $VERSION --no-git-tag-version --allow-same-version
      - name: Package extension
        run: npx vsce package
        working-directory: editors/vscode
      - name: Publish to VS Code Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}
        working-directory: editors/vscode
      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix --pat ${{ secrets.OVSX_PAT }}
        working-directory: editors/vscode
      - name: Upload .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/*.vsix
