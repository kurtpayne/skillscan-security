version: "2026.03.21.1"
# Multi-language static rule coverage for JS/TS, Ruby, Go, and Rust.
# Rules are tagged with a `language` metadata field so the scanner can
# filter by detected ecosystem when --ecosystem is specified.
static_rules:

# ── JavaScript / TypeScript ──────────────────────────────────────────────────

- id: JS-001
  category: malware_pattern
  severity: high
  confidence: 0.90
  title: JavaScript eval() or Function() dynamic code execution
  pattern: (?<!\w)(?:eval\s*\(|new\s+Function\s*\()
  mitigation: >
    Avoid eval() and new Function() with untrusted input. Use static imports
    and explicit function calls instead.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - javascript
    - typescript
    - dynamic_exec
    language: javascript

- id: JS-002
  category: malware_pattern
  severity: high
  confidence: 0.88
  title: Node.js child_process execution
  pattern: (?:require\s*\(\s*['"]child_process['"]\s*\)|child_process\s*\.\s*(?:exec|execSync|spawn|spawnSync|execFile|execFileSync)\s*\()
  mitigation: >
    Avoid spawning child processes from skill code. If shell execution is
    required, validate and allowlist all commands and arguments.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - javascript
    - typescript
    - shell_exec
    language: javascript

- id: JS-003
  category: exfil_channel
  severity: high
  confidence: 0.85
  title: Node.js fs access to credential paths
  pattern: (?:readFileSync|readFile|createReadStream)\s*\(\s*(?:[`'"]|.*\+).*(?:\.ssh|\.aws|credentials|id_rsa|\.npmrc|\.netrc|wallet\.dat|keystore)
  mitigation: >
    Do not read credential files or SSH keys from skill code. Access to
    ~/.ssh, ~/.aws/credentials, and similar paths is a strong exfiltration signal.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXF-001
      name: Credential access
    tags:
    - javascript
    - typescript
    - credential_access
    language: javascript

- id: JS-004
  category: malware_pattern
  severity: medium
  confidence: 0.80
  title: Dynamic import() with user-controlled or variable path
  pattern: (?:import\s*\(\s*(?:[^'")\s][^)]*|`[^`]*\$\{))
  mitigation: >
    Avoid dynamic import() with variable or user-controlled paths. Use static
    imports so module resolution is predictable and auditable.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - javascript
    - typescript
    - dynamic_import
    language: javascript

- id: JS-005
  category: malware_pattern
  severity: high
  confidence: 0.87
  title: Node.js process.env credential enumeration
  pattern: process\.env\s*(?:\.\s*(?:AWS_SECRET|GITHUB_TOKEN|NPM_TOKEN|OPENAI_API_KEY|ANTHROPIC_API_KEY|SECRET|PASSWORD|PASSWD|PRIVATE_KEY|ACCESS_TOKEN)|\[['"][A-Z_]*(?:SECRET|TOKEN|KEY|PASSWORD|PASSWD)['"]\])
  mitigation: >
    Do not enumerate or transmit environment variables containing credentials.
    Skills should not read secrets from process.env and forward them externally.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXF-001
      name: Credential access
    tags:
    - javascript
    - typescript
    - env_credential
    language: javascript

# ── Ruby ─────────────────────────────────────────────────────────────────────

- id: RB-001
  category: malware_pattern
  severity: high
  confidence: 0.90
  title: Ruby backtick or system() shell execution
  pattern: (?:`[^`]+`|(?<!\w)(?:system|exec|spawn)\s*\(|Kernel\s*\.\s*(?:system|exec|spawn)\s*\()
  mitigation: >
    Avoid backtick execution, system(), exec(), and spawn() in skill code.
    If shell commands are required, validate all arguments and avoid user-controlled input.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - ruby
    - shell_exec
    language: ruby

- id: RB-002
  category: malware_pattern
  severity: high
  confidence: 0.88
  title: Ruby Kernel.eval or binding.eval dynamic execution
  pattern: (?:Kernel\s*\.\s*eval|binding\s*\.\s*eval|instance_eval|class_eval|module_eval)\s*\(
  mitigation: >
    Avoid eval-family methods with untrusted input. Dynamic evaluation of
    strings as code is a common code injection vector.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - ruby
    - dynamic_exec
    language: ruby

- id: RB-003
  category: exfil_channel
  severity: high
  confidence: 0.85
  title: Ruby open() with pipe prefix (command injection)
  pattern: open\s*\(\s*['"]?\s*\|
  mitigation: >
    Ruby's open() with a pipe prefix executes a shell command. Use IO.popen
    with an explicit argument array instead, and validate all inputs.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - ruby
    - command_injection
    language: ruby

- id: RB-004
  category: exfil_channel
  severity: high
  confidence: 0.85
  title: Ruby credential file access
  pattern: (?:File\.read|IO\.read|open)\s*\([^)]*(?:\.ssh|\.aws|credentials|id_rsa|\.netrc|wallet\.dat|keystore)
  mitigation: >
    Do not read credential files or SSH keys from skill code. Access to
    ~/.ssh, ~/.aws/credentials, and similar paths is a strong exfiltration signal.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXF-001
      name: Credential access
    tags:
    - ruby
    - credential_access
    language: ruby

# ── Go ───────────────────────────────────────────────────────────────────────

- id: GO-001
  category: malware_pattern
  severity: high
  confidence: 0.90
  title: Go os/exec.Command shell execution
  pattern: (?:exec\.Command|exec\.CommandContext)\s*\(
  mitigation: >
    Avoid os/exec.Command in skill code. If shell execution is required,
    validate all arguments and avoid user-controlled input in command strings.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - go
    - shell_exec
    language: go

- id: GO-002
  category: malware_pattern
  severity: critical
  confidence: 0.92
  title: Go syscall.Exec direct syscall execution
  pattern: syscall\.(?:Exec|ForkExec|StartProcess)\s*\(
  mitigation: >
    Direct syscall execution bypasses standard process isolation. This pattern
    is rarely legitimate in skill code and is a strong malware signal.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - go
    - syscall
    language: go

- id: GO-003
  category: malware_pattern
  severity: high
  confidence: 0.85
  title: Go plugin.Open dynamic library loading
  pattern: plugin\.Open\s*\(
  mitigation: >
    Dynamic plugin loading can execute arbitrary code at runtime. Avoid
    plugin.Open in skill code; use static linking instead.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - go
    - dynamic_loading
    language: go

- id: GO-004
  category: exfil_channel
  severity: high
  confidence: 0.85
  title: Go credential file access
  pattern: os\.(?:Open|ReadFile)\s*\([^)]*(?:\.ssh|\.aws|credentials|id_rsa|\.netrc|wallet\.dat|keystore)
  mitigation: >
    Do not read credential files or SSH keys from skill code.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXF-001
      name: Credential access
    tags:
    - go
    - credential_access
    language: go

# ── Rust ─────────────────────────────────────────────────────────────────────

- id: RS-001
  category: malware_pattern
  severity: high
  confidence: 0.90
  title: Rust std::process::Command shell execution
  pattern: (?:process::Command|Command::new)\s*\(
  mitigation: >
    Avoid std::process::Command in skill code. If shell execution is required,
    validate all arguments and avoid user-controlled input.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - rust
    - shell_exec
    language: rust

- id: RS-002
  category: malware_pattern
  severity: critical
  confidence: 0.88
  title: Rust unsafe block combined with network or file I/O
  pattern: unsafe\s*\{[^}]*(?:TcpStream|UdpSocket|File::open|fs::read|libc::|std::net)
  mitigation: >
    Unsafe blocks that combine raw memory operations with network or file I/O
    are a strong signal for memory-unsafe exfiltration or exploitation.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - rust
    - unsafe
    language: rust

- id: RS-003
  category: exfil_channel
  severity: high
  confidence: 0.85
  title: Rust credential file access
  pattern: (?:fs::read_to_string|File::open)\s*\([^)]*(?:\.ssh|\.aws|credentials|id_rsa|\.netrc|wallet\.dat|keystore)
  mitigation: >
    Do not read credential files or SSH keys from skill code.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXF-001
      name: Credential access
    tags:
    - rust
    - credential_access
    language: rust

- id: RS-004
  category: malware_pattern
  severity: high
  confidence: 0.82
  title: Rust libc foreign function interface execution
  pattern: libc::\s*(?:system|execv|execve|execvp|popen)\s*\(
  mitigation: >
    Direct libc FFI calls to system/exec functions bypass Rust's process
    safety model. This pattern is a strong malware signal in skill code.
  metadata:
    version: 1.0.0
    status: active
    techniques:
    - id: EXEC-002
      name: Dynamic code execution
    tags:
    - rust
    - ffi_exec
    language: rust
