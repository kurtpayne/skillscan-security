version: "2026.02.23.1"

static_rules:
  - id: MAL-001
    category: malware_pattern
    severity: critical
    confidence: 0.95
    title: Download-and-execute chain
    pattern: '(curl|wget).*(bash|sh)'
    mitigation: Remove download-and-execute chains. Pin and verify artifacts before execution.

  - id: MAL-002
    category: malware_pattern
    severity: high
    confidence: 0.9
    title: Base64 decode + execution
    pattern: 'base64\s+-d.*(bash|sh|python)'
    mitigation: Avoid decode-and-exec flows. Store reviewed scripts in-repo and execute only trusted files.

  - id: ABU-001
    category: instruction_abuse
    severity: high
    confidence: 0.9
    title: Coercive prerequisite wording
    pattern: 'must run.*sudo|disable.*security|turn off.*defender'
    mitigation: Remove coercive setup steps. Do not ask users to disable security controls.

  - id: PINJ-001
    category: instruction_abuse
    severity: high
    confidence: 0.82
    title: Prompt override / jailbreak instruction pattern
    pattern: 'ignore (all )?(previous|prior) instructions|override (the )?(system|safety) prompt|developer mode|jailbreak|do not reveal these instructions'
    mitigation: Remove instruction-override content and keep model behavior constrained by explicit trusted policy.

  - id: EXF-001
    category: exfiltration
    severity: high
    confidence: 0.9
    title: Sensitive credential file access
    pattern: '(\.env|id_rsa|aws_access_key_id|browser.*cookies)'
    mitigation: Do not read secret files unless strictly required; use scoped secret providers instead.

  - id: EXF-002
    category: exfiltration
    severity: high
    confidence: 0.88
    title: Cryptocurrency wallet file access
    pattern: '(wallet\.dat|\.keystore|seed\.txt|mnemonic|private.*key\.json|\.wallet|ethkey|metamask)'
    mitigation: Do not access wallet files or seed phrases; crypto operations should use secure key management and never expose private keys.

  - id: EXF-003
    category: exfiltration
    severity: high
    confidence: 0.84
    title: Markdown image beacon exfiltration pattern
    pattern: '!\[[^\]]*\]\(https?://[^)]+\?(?:[^)]*)(?:data|dump|exfil|token|key)=\{?[a-zA-Z_][\w-]*\}?[^)]*\)'
    mitigation: Do not include instruction-driven external image beacons with interpolated data placeholders; treat metadata/context text as untrusted.

  - id: EXF-004
    category: exfiltration
    severity: high
    confidence: 0.93
    title: GitHub Actions full secrets context dump
    pattern: '\$\{\{\s*toJSON\(\s*secrets\s*\)\s*\}\}'
    mitigation: Never serialize full GitHub Actions secrets context; pass only minimally scoped values required for a specific step.

  - id: EXF-005
    category: exfiltration
    severity: high
    confidence: 0.91
    title: GitHub Actions untrusted PR head checkout reference
    pattern: 'ref:\s*\$\{\{\s*github\.event\.pull_request\.head\.(?:sha|ref)\s*\}\}|repository:\s*\$\{\{\s*github\.event\.pull_request\.head\.repo\.full_name\s*\}\}'
    mitigation: Avoid checking out `github.event.pull_request.head.*` in privileged workflows. Use `pull_request` for untrusted code, or gate privileged jobs and use immutable trusted refs.

  - id: EXF-006
    category: exfiltration
    severity: high
    confidence: 0.9
    title: IPv4-mapped IPv6 loopback/metadata SSRF bypass literal
    pattern: '(?i)(?:0:0:0:0:0:ffff:7f00:1|::ffff:127\.0\.0\.1|0:0:0:0:0:ffff:a9fe:a9fe|::ffff:169\.254\.169\.254)'
    mitigation: Block IPv4-mapped IPv6 loopback/metadata literals in untrusted URLs and normalize IP forms before SSRF allow/deny checks.

  - id: EXF-007
    category: exfiltration
    severity: high
    confidence: 0.91
    title: OpenClaw gateway token/private-key config access marker
    pattern: '(?i)(?:\.openclaw[/\\](?:openclaw\.json|device\.json)|\bgateway\.auth\.token\b|\bprivateKeyPem\b|\bopenclaw\.json\b|\bdevice\.json\b)'
    mitigation: Do not read, copy, or transmit OpenClaw agent config/identity files (`openclaw.json`, `device.json`) or fields like `gateway.auth.token`/`privateKeyPem`; rotate compromised tokens and re-pair devices.

  - id: MAL-003
    category: malware_pattern
    severity: high
    confidence: 0.9
    title: Subshell downloader execution pattern
    pattern: '(source|bash)\s*<\(\s*(curl|wget)|powershell\s+-enc(?:odedcommand)?'
    mitigation: Remove subshell/encoded execution flows. Keep scripts explicit, reviewed, and non-obfuscated.

  - id: MAL-004
    category: malware_pattern
    severity: high
    confidence: 0.85
    title: Dynamic code evaluation pattern
    pattern: '\beval\(|(?:^|\s)exec\(|Function\([^)]*\)|vm\.runInNewContext|vm\.runInThisContext|__import__\('
    mitigation: Avoid eval/exec flows that execute arbitrary code strings; use explicit functions and validated inputs instead.

  - id: OBF-001
    category: instruction_abuse
    severity: medium
    confidence: 0.9
    title: Bidirectional Unicode control character detected
    pattern: '[\u202A-\u202E\u2066-\u2069]'
    mitigation: Remove bidi control characters and verify displayed text matches executed intent.

  - id: OBF-002
    category: instruction_abuse
    severity: medium
    confidence: 0.8
    title: Stealth execution pattern
    pattern: 'CREATE_NO_WINDOW|nohup.*>/dev/null|&\s*>/dev/null\s*2>&1|\.bat\s+>nul\s+2>&1'
    mitigation: Remove hidden/stealth execution flags and output redirection that obscure command behavior.

  - id: SUP-002
    category: malware_pattern
    severity: high
    confidence: 0.86
    title: npx registry fallback execution without --no-install
    pattern: '\bnpx\s+(?![^\n]*--no-install\b)(?:@[a-z0-9._-]+/[a-z0-9._-]+|[a-z0-9._-]+)\b'
    mitigation: Avoid implicit npx registry fallback. Prefer explicit local installs and use `npx --no-install` for command execution.

  - id: SUP-003
    category: malware_pattern
    severity: high
    confidence: 0.84
    title: Piped sed write to out-of-scope or agent config path
    pattern: 'echo\s+.*\|\s*sed\b[^\n]*>\s*(?:\.\./|/[^\s]*\.claude/|\.claude/)'
    mitigation: Avoid shell-based piped rewrite chains that redirect into `.claude/` or parent-directory paths. Use scoped file APIs with explicit path allowlists.

  - id: DEF-001
    category: malware_pattern
    severity: critical
    confidence: 0.95
    title: Windows Defender exclusion manipulation
    pattern: '(?i)(Add-MpPreference|Set-MpPreference)\s+-Exclusion(Path|Extension|Process)|Defender.*exclusion|DisableRealtimeMonitoring'
    mitigation: Remove all commands that disable or weaken Windows Defender protections. Security controls should never be programmatically disabled.

  - id: MAL-005
    category: malware_pattern
    severity: high
    confidence: 0.92
    title: mshta.exe remote execution pattern
    pattern: '\bmshta(?:\.exe)?\s+(?:https?://|\\\\)'
    mitigation: Remove mshta.exe invocations that fetch remote HTA/VBScript payloads. Use explicit local scripts with integrity validation instead.

  - id: MAL-006
    category: malware_pattern
    severity: high
    confidence: 0.91
    title: PowerShell web request piped to Invoke-Expression
    pattern: '(?i)\b(?:iwr|irm|invoke-webrequest|invoke-restmethod)\b[^\n]{0,220}\|\s*(?:iex|invoke-expression)\b|\b(?:iex|invoke-expression)\b[^\n]{0,220}\b(?:iwr|irm|invoke-webrequest|invoke-restmethod)\b'
    mitigation: Remove web-request-to-Invoke-Expression execution chains. Download reviewed scripts to disk, validate integrity, and run with explicit local paths.

  - id: SUP-004
    category: malware_pattern
    severity: high
    confidence: 0.89
    title: npm preinstall/postinstall shell bootstrap pattern
    pattern: '(?i)"(?:preinstall|postinstall)"\s*:\s*"[^"\n]{0,300}(?:curl|wget|iwr|irm|invoke-webrequest|invoke-restmethod|powershell(?:\.exe)?|cmd(?:\.exe)?\s*/c|bash\s+-c|sh\s+-c)[^"\n]*"'
    mitigation: Remove shell/bootstrap execution from npm preinstall/postinstall hooks. Use explicit reviewed setup steps outside lifecycle scripts.

  - id: SUP-005
    category: malware_pattern
    severity: high
    confidence: 0.86
    title: npm preinstall/postinstall inline Node eval pattern
    pattern: '(?i)"(?:preinstall|postinstall)"\s*:\s*"[^"\n]{0,260}\bnode\s+(?:--eval|-e)\b[^"\n]*"'
    mitigation: Remove inline `node -e/--eval` execution from npm install lifecycle hooks. Use reviewed version-controlled scripts with explicit file paths.

  - id: MAL-007
    category: malware_pattern
    severity: high
    confidence: 0.87
    title: BYOVD security-killer toolkit marker
    pattern: '(?i)\b(?:nseckrnl|truesightkiller|aukill|poortry|ghostdriver|warp\s*avkiller)\b|\bsc\s+create\s+(?:nseckrnl|truesightkiller|aukill|poortry|ghostdriver)\b'
    mitigation: Remove BYOVD-related tool/driver references and service-creation commands. Never include guidance that disables EDR/AV through vulnerable drivers.

  - id: MAL-008
    category: malware_pattern
    severity: high
    confidence: 0.9
    title: Discord Electron debugger credential interception marker
    pattern: '(?is)(?:webContents[\s\S]{0,80}debugger[\s\S]{0,120}(?:attach|on|sendCommand)[\s\S]{0,900}(?:Network\.(?:getResponseBody|getRequestPostData)|/login|/register|/mfa(?:/totp)?|codes-verification)|Network\.(?:getResponseBody|getRequestPostData)[\s\S]{0,240}(?:/login|/register|/mfa(?:/totp)?|codes-verification))'
    mitigation: Remove Electron debugger network-interception hooks that capture credentials, MFA data, or tokens from Discord endpoints.

  - id: EXF-008
    category: malware_pattern
    severity: high
    confidence: 0.88
    title: GitHub Actions untrusted PR metadata interpolation in run/script
    pattern: '\$\{\{\s*github\.event\.pull_request\.(?:title|body|head\.label|user\.login)\s*\}\}'
    mitigation: Do not interpolate untrusted pull request metadata directly into shell/script steps. Pass through safe quoting or dedicated actions and avoid shell evaluation in privileged workflows.

  - id: MAL-010
    category: malware_pattern
    severity: high
    confidence: 0.86
    title: GitHub Actions issue/comment metadata interpolation in run/script
    pattern: '\$\{\{\s*github\.event\.(?:issue\.(?:title|body)|comment\.body|discussion\.(?:title|body)|discussion_comment\.body)\s*\}\}'
    mitigation: Do not interpolate untrusted issue/comment/discussion content directly into shell or script blocks. Route via environment variables and treat values as untrusted data.

  - id: MAL-009
    category: malware_pattern
    severity: high
    confidence: 0.88
    title: ClickFix DNS nslookup staged command execution pattern
    pattern: '(?i)\bnslookup(?:\.exe)?\b[^\n]{0,260}(?:\s+-q=txt|\s+-querytype=txt)\b[^\n]{0,260}\b(?:findstr|for\s+/f|select-string)\b[^\n]{0,260}\b(?:cmd(?:\.exe)?\s*/c|powershell(?:\.exe)?|pwsh|iex|invoke-expression)\b'
    mitigation: Do not include ClickFix-style instructions that parse DNS lookup output and execute it. Never run clipboard/Run-dialog commands from untrusted pages.


  - id: SUP-006
    category: malware_pattern
    severity: high
    confidence: 0.89
    title: Dotenv newline environment-variable injection payload marker
    pattern: '(?i)(?:access[_-]?token|refresh[_-]?token|client[_-]?secret|set[_-]?user[_-]?tokens)[^\n]{0,180}(?:%0a|%0d|\\n|\\r)[^\n]{0,120}[A-Z][A-Z0-9_]{2,}\s*='
    mitigation: Reject newline/carriage-return characters in token inputs before writing `.env` files. Update env values via strict key allowlists and escaped serialization.

  - id: SUP-007
    category: malware_pattern
    severity: high
    confidence: 0.87
    title: npm preinstall/postinstall global package install pattern
    pattern: '(?i)"(?:preinstall|postinstall)"\s*:\s*"[^"\n]{0,260}\bnpm\s+(?:install|i)\s+-g\s+[^"\n]+'
    mitigation: Remove global package installation from npm install lifecycle hooks. Keep dependency setup explicit, pinned, and user-initiated outside preinstall/postinstall.

  - id: SUP-008
    category: malware_pattern
    severity: high
    confidence: 0.84
    title: npm lifecycle mutable @latest dependency install pattern
    pattern: '(?i)"(?:preinstall|postinstall)"\s*:\s*"[^"\n]{0,300}\bnpm\s+(?:install|i)\b(?![^"\n]*(?:\s-g\b|\s--global\b))[^"\n]*@[^\s"\n]*latest\b[^"\n]*"'
    mitigation: Avoid `npm install ...@latest` inside install lifecycle hooks. Use pinned versions and explicit user-initiated install/update steps outside preinstall/postinstall.

action_patterns:
  download: '\b(curl|wget|invoke-webrequest|invoke-restmethod|iwr|irm|download|git\s+clone|pip\s+install|npm\s+install|certutil\s+-urlcache|bitsadmin)\b|https?://'
  execute: '\b(bash|sh|powershell|pwsh|cmd\.exe|os\.system|subprocess|python\s+-c|python3?\s+[^\s-]\S*|node\s+-e|perl\s+-e|ruby\s+-e)\b'
  secret_access: '(\.env|id_rsa|aws_access_key_id|ssh key|credentials?)'
  network: 'https?://|webhook|post\b|upload|socket|requests\.'
  gh_actions_secrets: '\$\{\{\s*(?:toJSON\(\s*secrets\s*\)|secrets\.[A-Za-z_][A-Za-z0-9_]*)\s*\}\}'
  gh_pr_target: '\bpull_request_target\b'
  gh_pr_head_checkout: '\$\{\{\s*github\.event\.pull_request\.head\.(?:sha|ref|repo\.full_name)\s*\}\}'
  gh_pr_untrusted_meta: '\$\{\{\s*github\.event\.pull_request\.(?:title|body|head\.label|user\.login)\s*\}\}'
  privilege: '\bsudo\b|run as administrator|elevat'
  security_disable: 'disable (security|defender|av|antivirus)|turn off (security|defender|av|antivirus)'

chain_rules:
  - id: CHN-001
    category: malware_pattern
    severity: critical
    confidence: 0.95
    title: "Dangerous action chain: download plus execute"
    all_of: [download, execute]
    snippet: download + execute actions detected
    mitigation: Break download+execute flows; require reviewed local artifacts and explicit integrity checks.

  - id: CHN-002
    category: exfiltration
    severity: critical
    confidence: 0.92
    title: "Potential secret exfiltration chain"
    all_of: [secret_access, network]
    snippet: secret access + outbound network actions detected
    mitigation: Remove any secret-to-network path; use scoped token exchange or local-only processing.

  - id: CHN-004
    category: exfiltration
    severity: critical
    confidence: 0.94
    title: "GitHub Actions secrets context with outbound network"
    all_of: [gh_actions_secrets, network]
    snippet: GitHub Actions secrets context + network/exfil markers detected
    mitigation: Remove full secrets-context expansion and block outbound transfer of CI/CD secrets.

  - id: CHN-005
    category: exfiltration
    severity: critical
    confidence: 0.93
    title: "pull_request_target with untrusted PR head checkout"
    all_of: [gh_pr_target, gh_pr_head_checkout]
    snippet: pull_request_target + github.event.pull_request.head.* checkout markers detected
    mitigation: Do not combine `pull_request_target` with checkout of untrusted PR head refs. Use unprivileged `pull_request` jobs for untrusted code.

  - id: ABU-002
    category: instruction_abuse
    severity: high
    confidence: 0.9
    title: "Elevated setup with security bypass"
    all_of: [privilege, security_disable]
    snippet: privilege escalation + security disable sequence detected
    mitigation: Remove elevation plus security-disable guidance from setup instructions.

  - id: CHN-006
    category: malware_pattern
    severity: critical
    confidence: 0.91
    title: "pull_request_target with untrusted PR metadata in shell/script"
    all_of: [gh_pr_target, gh_pr_untrusted_meta]
    snippet: pull_request_target + github.event.pull_request.{title/body/etc} interpolation detected in script context
    mitigation: Avoid using pull_request_target with direct shell/script interpolation of PR metadata. Use non-shell actions, strict quoting, and unprivileged workflows for untrusted input.

capability_patterns:
  shell_execution: '\b(subprocess|os\.system|bash|powershell)\b'
  network_access: '\b(requests\.|fetch\(|axios|http[s]?://|socket)\b'
  filesystem_write: '\b(open\(.*[wa]|write_text\(|append)\b'
