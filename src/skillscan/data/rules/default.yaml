action_patterns:
  download: \b(curl|wget|invoke-webrequest|invoke-restmethod|iwr|irm|download|git\s+clone|pip\s+install|npm\s+install|certutil\s+-urlcache|bitsadmin)\b|https?://
  execute: \b(bash|sh|powershell|pwsh|cmd\.exe|os\.system|subprocess|python\s+-c|python3?\s+[^\s-]\S*|node\s+-e|perl\s+-e|ruby\s+-e)\b
  secret_access: (\.env|id_rsa|aws_access_key_id|ssh key|credentials?)
  network: https?://|webhook|post\b|upload|socket|requests\.
  gh_actions_secrets: \$\{\{\s*(?:toJSON\(\s*secrets\s*\)|secrets\.[A-Za-z_][A-Za-z0-9_]*)\s*\}\}
  gh_pr_target: \bpull_request_target\b
  gh_pr_head_checkout: \$\{\{\s*github\.event\.pull_request\.head\.(?:sha|ref|repo\.full_name)\s*\}\}
  gh_pr_untrusted_meta: \$\{\{\s*github\.event\.pull_request\.(?:title|body|head\.label|user\.login)\s*\}\}
  gh_pr_ref_meta: \$\{\{\s*(?:github\.(?:head_ref|ref_name)|github\.event\.pull_request\.head\.ref|steps\.[A-Za-z0-9_-]+\.outputs\.pr_head_ref)\s*\}\}
  gh_cache_untrusted_key: (?i)\bkey:\s*[^\n]*\$\{\{\s*github\.event\.pull_request\.(?:title|body|head\.label|head\.ref|user\.login)\s*\}\}
  gh_unpinned_action_ref: (?im)^\s*-?\s*uses:\s*[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+@(?![0-9a-f]{40}\b)[^\s#]+
  privilege: \bsudo\b|run as administrator|elevat
  security_disable: disable (security|defender|av|antivirus)|turn off (security|defender|av|antivirus)
  claude_hooks_marker: (?i)"hooks"\s*:\s*\{|"(?:PreToolUse|PostToolUse|UserPromptSubmit|SessionStart)"
  hook_shell_command_field: (?i)"command"\s*:\s*"(?:bash|sh|zsh|powershell|pwsh|cmd(?:\.exe)?|python3?\s+-c|node\s+-e)[^"\n]{0,240}"
  mcp_tool_poison: (?i)(?s:<IMPORTANT>[\s\S]{0,2000}</IMPORTANT>)|(?:do not mention|hide this|background telemetry)[^\n]{0,120}(?:read|access|send|exfil|forward)
  stealth_conceal: (?i)(?:do not (?:mention|tell|reveal|show)|hide (?:this|these|the above) (?:step|action)|(?:this is|these are) background (?:telemetry|operation))
  container_escape: (?i)(?:docker\.sock|--privileged|--cap-add[=\s]+(?:ALL|SYS_ADMIN)|nsenter\s+|chroot\s+/host)
  host_path_mount: (?i)(?:-v\s+/(?:etc|root|home|var/run|proc|sys)[:/]|--mount[^\n]{0,100}(?:type=bind|source=/(?:etc|root|home|proc|sys)))
chain_rules:
- id: CHN-001
  category: malware_pattern
  severity: critical
  confidence: 0.95
  title: 'Dangerous action chain: download plus execute'
  all_of:
  - download
  - execute
  snippet: download + execute actions detected
  mitigation: Break download+execute flows; require reviewed local artifacts and explicit integrity checks.
- id: CHN-002
  category: exfiltration
  severity: critical
  confidence: 0.92
  title: Potential secret exfiltration chain
  all_of:
  - secret_access
  - network
  snippet: secret access + outbound network actions detected
  mitigation: Remove any secret-to-network path; use scoped token exchange or local-only processing.
- id: CHN-004
  category: exfiltration
  severity: critical
  confidence: 0.94
  title: GitHub Actions secrets context with outbound network
  all_of:
  - gh_actions_secrets
  - network
  snippet: GitHub Actions secrets context + network/exfil markers detected
  mitigation: Remove full secrets-context expansion and block outbound transfer of CI/CD secrets.
- id: CHN-005
  category: exfiltration
  severity: critical
  confidence: 0.93
  title: pull_request_target with untrusted PR head checkout
  all_of:
  - gh_pr_target
  - gh_pr_head_checkout
  snippet: pull_request_target + github.event.pull_request.head.* checkout markers detected
  mitigation: Do not combine `pull_request_target` with checkout of untrusted PR head refs. Use unprivileged `pull_request`
    jobs for untrusted code.
- id: ABU-002
  category: instruction_abuse
  severity: high
  confidence: 0.9
  title: Elevated setup with security bypass
  all_of:
  - privilege
  - security_disable
  snippet: privilege escalation + security disable sequence detected
  mitigation: Remove elevation plus security-disable guidance from setup instructions.
- id: CHN-006
  category: malware_pattern
  severity: critical
  confidence: 0.91
  title: pull_request_target with untrusted PR metadata in shell/script
  all_of:
  - gh_pr_target
  - gh_pr_untrusted_meta
  snippet: pull_request_target + github.event.pull_request.{title/body/etc} interpolation detected in script context
  mitigation: Avoid using pull_request_target with direct shell/script interpolation of PR metadata. Use non-shell actions,
    strict quoting, and unprivileged workflows for untrusted input.
- id: CHN-007
  category: exfiltration
  severity: critical
  confidence: 0.9
  title: pull_request_target with untrusted PR-derived Actions cache key
  all_of:
  - gh_pr_target
  - gh_cache_untrusted_key
  snippet: pull_request_target + actions/cache key derived from github.event.pull_request.* metadata detected
  mitigation: Avoid cache key derivation from untrusted PR metadata in privileged workflows. Separate caches for untrusted
    jobs and trusted release/publish jobs.
- id: CHN-008
  category: malware_pattern
  severity: critical
  confidence: 0.88
  title: pull_request_target with unpinned third-party GitHub Action
  all_of:
  - gh_pr_target
  - gh_unpinned_action_ref
  snippet: pull_request_target + third-party action reference pinned to mutable tag/branch detected
  mitigation: In pull_request_target workflows, pin third-party actions to full 40-char commit SHAs and review upstream provenance
    before updates.
- id: CHN-009
  category: malware_pattern
  severity: high
  confidence: 0.87
  title: Repository hook configuration with shell-command payload
  all_of:
  - claude_hooks_marker
  - hook_shell_command_field
  snippet: hook configuration marker + shell-capable command payload detected
  mitigation: Treat repository hook configuration as untrusted and block shell-capable `command` payloads unless explicitly
    reviewed and approved.
- id: CHN-010
  category: malware_pattern
  severity: critical
  confidence: 0.89
  title: pull_request_target with branch/ref metadata interpolation in shell/script
  all_of:
  - gh_pr_target
  - gh_pr_ref_meta
  snippet: pull_request_target + branch/ref metadata interpolation marker detected
  mitigation: Do not combine `pull_request_target` with direct shell/script interpolation of PR branch/ref values. Quote safely,
    avoid shell evaluation, and run untrusted PR data in unprivileged workflows.
- id: CHN-011
  category: exfiltration
  severity: critical
  confidence: 0.93
  title: MCP tool poisoning with credential exfiltration chain
  all_of:
  - mcp_tool_poison
  - secret_access
  snippet: MCP tool description poisoning + credential/secret access markers detected
  mitigation: Reject MCP tool descriptions that contain hidden instruction blocks combined with credential access patterns.
    This is a documented tool-poisoning exfiltration attack.
- id: CHN-012
  category: exfiltration
  severity: critical
  confidence: 0.91
  title: Stealth concealment with network exfiltration chain
  all_of:
  - stealth_conceal
  - network
  snippet: stealth instruction concealment + outbound network markers detected
  mitigation: Remove instructions that conceal agent actions from the user while performing network operations. This pattern
    indicates covert data exfiltration.
- id: CHN-013
  category: malware_pattern
  severity: critical
  confidence: 0.92
  title: Container escape with host path mount chain
  all_of:
  - container_escape
  - host_path_mount
  snippet: container escape mechanism + sensitive host path mount detected
  mitigation: Do not combine privileged container execution with sensitive host path mounts. This enables full host compromise
    from within a container.
- id: CHN-014
  category: malware_pattern
  severity: critical
  confidence: 0.90
  title: Container escape with secret access chain
  all_of:
  - container_escape
  - secret_access
  snippet: container escape mechanism + credential/secret access markers detected
  mitigation: Do not combine privileged container access with credential harvesting. This enables host credential theft
    via container breakout.
capability_patterns:
  shell_execution: \b(subprocess|os\.system|bash|powershell)\b
  network_access: \b(requests\.|fetch\(|axios|http[s]?://|socket)\b
  filesystem_write: \b(open\(.*[wa]|write_text\(|append)\b
