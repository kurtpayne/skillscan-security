name: Release Docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches project version
        run: |
          PROJECT_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text())
          print(data['project']['version'])
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag/version mismatch: tag=$TAG_VERSION pyproject=$PROJECT_VERSION"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skillscan-security
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate Docker image SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/skillscan-security:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom-docker.spdx.json
          upload-release-assets: false

      - name: Validate Docker SBOM
        run: python scripts/validate_sbom.py --spdx sbom-docker.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign image tags and attest SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/skillscan-security"
          TAG_VERSION="${{ github.ref_name }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          cosign sign --yes "$IMAGE:$TAG_VERSION@$DIGEST"
          cosign sign --yes "$IMAGE:latest@$DIGEST"

          cosign attest --yes --predicate sbom-docker.spdx.json --type spdxjson "$IMAGE:$TAG_VERSION@$DIGEST"

      - name: Sign Docker SBOM blob (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes sbom-docker.spdx.json --output-signature sbom-docker.spdx.json.sig --output-certificate sbom-docker.spdx.json.pem

      - name: Upload Docker SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-sbom
          path: |
            sbom-docker.spdx.json
            sbom-docker.spdx.json.sig
            sbom-docker.spdx.json.pem
