name: Release PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' build cyclonedx-bom

      - name: Validate tag matches project version
        run: |
          PROJECT_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text())
          print(data['project']['version'])
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag/version mismatch: tag=$TAG_VERSION pyproject=$PROJECT_VERSION"
            exit 1
          fi

      - name: Run tests
        run: pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - name: Generate Python dependency SBOM (CycloneDX)
        run: cyclonedx-py environment --of JSON --output-file dist/sbom-python.cdx.json

      - name: Validate Python SBOM
        run: python scripts/validate_sbom.py --cyclonedx dist/sbom-python.cdx.json

      - name: Smoke install from built wheel
        run: |
          python -m venv /tmp/skillscan-smoke
          source /tmp/skillscan-smoke/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          skillscan --help > /dev/null

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign SBOM + checksums (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes dist/sbom-python.cdx.json --output-signature dist/sbom-python.cdx.json.sig --output-certificate dist/sbom-python.cdx.json.pem
          cosign sign-blob --yes dist/SHA256SUMS --output-signature dist/SHA256SUMS.sig --output-certificate dist/SHA256SUMS.pem

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload release support artifacts (checksums + SBOM + signatures)
        uses: actions/upload-artifact@v4
        with:
          name: python-release-support
          path: |
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
            dist/sbom-python.cdx.json
            dist/sbom-python.cdx.json.sig
            dist/sbom-python.cdx.json.pem

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skillscan-security
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download release support artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-release-support
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
