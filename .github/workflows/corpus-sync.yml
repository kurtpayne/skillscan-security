name: Corpus Sync & Model Update Trigger
on:
  push:
    branches: [main]
    paths:
      - "corpus/**"
      - "scripts/finetune.py"
      - "src/skillscan/corpus.py"
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force fine-tune even if below delta threshold"
        required: false
        default: "false"
        type: string
jobs:
  corpus-sync:
    name: Sync corpus manifest & evaluate delta
    runs-on: ubuntu-latest
    outputs:
      should_retrain: ${{ steps.sync.outputs.should_retrain }}
      summary: ${{ steps.sync.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package (no ML extras needed for sync)
        run: pip install -e ".[dev]" --quiet
      - name: Fetch private corpus fixtures
        run: |
          if [ -z "$CORPUS_DEPLOY_KEY" ]; then
            echo "CORPUS_DEPLOY_KEY not set — skipping private corpus fetch"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$CORPUS_DEPLOY_KEY" > ~/.ssh/corpus_deploy_key
          chmod 600 ~/.ssh/corpus_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND='ssh -i ~/.ssh/corpus_deploy_key -o StrictHostKeyChecking=yes' \
            git clone --depth 1 git@github.com:kurtpayne/skillscan-corpus.git /tmp/skillscan-corpus
          for dir in adversarial jailbreak_distillations social_engineering; do
            if [ -d "/tmp/skillscan-corpus/$dir" ]; then
              mkdir -p "corpus/$dir"
              rsync -a --ignore-existing "/tmp/skillscan-corpus/$dir/" "corpus/$dir/"
            fi
          done
          if [ -d "/tmp/skillscan-corpus/held_out_eval" ]; then
            mkdir -p corpus/held_out_eval
            rsync -a --ignore-existing /tmp/skillscan-corpus/held_out_eval/ corpus/held_out_eval/
          fi
          rm -rf /tmp/skillscan-corpus ~/.ssh/corpus_deploy_key
          echo "Private corpus fixtures merged"
        env:
          CORPUS_DEPLOY_KEY: ${{ secrets.CORPUS_DEPLOY_KEY }}
      - name: Run corpus sync
        id: sync
        run: |
          python - <<'EOF'
          import json, os, sys
          sys.path.insert(0, "src")
          from skillscan.corpus import CorpusManager
          mgr = CorpusManager()
          decision = mgr.sync()
          print(decision.summary())
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"should_retrain={'true' if decision.should_retrain else 'false'}\n")
              fh.write(f"summary={decision.summary()}\n")
          EOF
        env:
          SKILLSCAN_MIN_NEW_EXAMPLES: ${{ vars.SKILLSCAN_MIN_NEW_EXAMPLES || '50' }}
          SKILLSCAN_MIN_DELTA_PCT: ${{ vars.SKILLSCAN_MIN_DELTA_PCT || '0.10' }}
      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(corpus): update manifest.json [skip ci]"
          file_pattern: "corpus/manifest.json"
          commit_user_name: "skillscan-bot"
          commit_user_email: "bot@skillscan.sh"
          push_options: "--force-with-lease"
  fine-tune:
    name: Fine-tune DeBERTa on Modal GPU (conditional)
    needs: corpus-sync
    if: needs.corpus-sync.outputs.should_retrain == 'true' || github.event.inputs.force_retrain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Modal + minimal dependencies
        run: pip install modal -e ".[dev]" --quiet
      - name: Configure Modal credentials
        run: |
          python - <<'EOF'
          import json, os, pathlib
          creds_dir = pathlib.Path.home() / ".modal"
          creds_dir.mkdir(parents=True, exist_ok=True)
          creds = {
              "token_id": os.environ["MODAL_TOKEN_ID"],
              "token_secret": os.environ["MODAL_TOKEN_SECRET"],
          }
          (creds_dir / "credentials.json").write_text(json.dumps(creds))
          print("Modal credentials configured")
          EOF
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      - name: Dispatch fine-tune to Modal GPU
        id: finetune
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_retrain }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          modal run scripts/finetune_modal.py $FORCE_FLAG
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      - name: Commit updated CORPUS_CARD.md and manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(corpus): update CORPUS_CARD.md after fine-tune [skip ci]"
          file_pattern: "corpus/CORPUS_CARD.md corpus/manifest.json"
          commit_user_name: "skillscan-bot"
          commit_user_email: "bot@skillscan.sh"
          push_options: "--force-with-lease"
      - name: Post summary
        if: always()
        run: |
          echo "### Fine-tune Result" >> $GITHUB_STEP_SUMMARY
          echo "Corpus delta: ${{ needs.corpus-sync.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
          echo "Model pushed to: https://huggingface.co/kurtpayne/skillscan-deberta-adapter" >> $GITHUB_STEP_SUMMARY
